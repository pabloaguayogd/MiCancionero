<!DOCTYPE html>
<html lang="es">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icono.png">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cancionero Offline</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; padding: 20px; }
        h1 { text-align: center; color: #00ff88; }
        .buscador { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; font-size: 16px; }
        .lista-canciones { list-style: none; padding: 0; }
        .cancion-item { background: #1e1e1e; margin: 10px 0; border-radius: 8px; }
        .cancion-item a { display: block; padding: 15px; color: #fff; text-decoration: none; font-size: 18px; }
        .cancion-item a span { color: #aaa; font-size: 14px; display: block; }
        .cancion-item:hover { background: #2a2a2a; }
    </style>
</head>
<body>

    <h1>🎵 Mi Cancionero</h1>
    <input type="text" id="buscador" class="buscador" placeholder="Buscar canción o artista..." onkeyup="filtrar()">

    <ul class="lista-canciones" id="lista">
        <li class="cancion-item">
            <a href="canciones/rayando-el-sol.html">
                Rayando el Sol
                <span>Maná</span>
            </a>
        </li>
        <li class="cancion-item">
            <a href="canciones/tu-calorro.html">
                Tu Calorro
                <span>Estopa</span>
            </a>
        </li>
		<li class="cancion-item">
            <a href="canciones/nana-triste.html">
                Nana triste
                <span>Natalia Lacunza & Guitarricadelafuente</span>
            </a>
        </li>
		<li class="cancion-item">
            <a href="canciones/fuentes-de-ortiz.html">
                Fuentes de Ortiz
                <span>Ed Maverick</span>
            </a>
        </li>
		<li class="cancion-item">
            <a href="canciones/todos-los-besos.html">
                Todos los besos
                <span>Los Rebujitos</span>
            </a>
        </li>
		<li class="cancion-item">
            <a href="canciones/amos-del-piano-bar.html">
                Amos del piano bar
                <span>Taburete</span>
            </a>
        </li>
		<li class="cancion-item">
            <a href="canciones/a-mi-manera.html">
                A mi manera
                <span>Siempre Así</span>
            </a>
        </li>
		
		
    </ul>

    <script>
        // Función simple para buscar en la lista
        function filtrar() {
            let input = document.getElementById('buscador').value.toLowerCase();
            let items = document.getElementsByClassName('cancion-item');
            
            for (let i = 0; i < items.length; i++) {
                let texto = items[i].innerText.toLowerCase();
                items[i].style.display = texto.includes(input) ? "" : "none";
            }
        }
    </script>
	
	<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker registrado con éxito.'))
      .catch((err) => console.log('Error al registrar el Service Worker:', err));
  }
</script>

</body>
</html>
